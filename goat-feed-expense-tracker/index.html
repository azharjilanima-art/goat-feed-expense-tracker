<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐐 Goat Feed Expense Tracker</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00c853">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="chart.js"></script>
    <script src="export.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">

    <h1>🐐 Goat Feed Expense Tracker</h1>

    <!-- Dashboard -->
    <div class="dashboard">

        <div class="card">
            <h3>Total Balance</h3>
            <p id="totalBalance">Rs. 0</p>
        </div>

        <div class="card">
            <h3>Cash Balance</h3>
            <p id="cashBalance">Rs. 0</p>
        </div>

        <div class="card">
            <h3>Online Balance</h3>
            <p id="onlineBalance">Rs. 0</p>
        </div>

        <div class="card">
            <h3>Total Expenses</h3>
            <p id="totalExpense">Rs. 0</p>
        </div>

        <div class="card">
            <h3>Total Transactions</h3>
            <p id="transactions">0</p>
        </div>

    </div>

    <!-- Add Balance -->
    <div class="section">
        <h2>Add Balance</h2>

        <div class="form-grid">

            <input type="number" id="cashInput"
                   placeholder="Cash Amount">

            <input type="number" id="onlineInput"
                   placeholder="Online Amount">

        </div>

        <button onclick="addBalance()">
            Add Balance
        </button>

    </div>


    <!-- Add Expense -->
    <div class="section">

        <h2>Add Feed Expense</h2>

        <div class="form-grid">

            <input type="date" id="date">

            <input type="text"
               id="feed"
               list="feedTypes"
               placeholder="Feed Type">

            <datalist id="feedTypes">
                <option value="Grass">
                <option value="Lucerne">
                <option value="Dana">
                <option value="Gandum Ka Daliya">
                <option value="Tori">
                <option value="Chokar">
                <option value="Khul">
            </datalist>

            <input type="number"
                   id="quantity"
                   placeholder="Quantity (Kg)">

            <input type="number"
                   id="amount"
                   placeholder="Amount (Rs.)">

            <select id="payment">
                <option>Cash</option>
                <option>Online</option>
            </select>


        </div>

        <button onclick="addExpense()">
            Add Expense
        </button>

    </div>


    <!-- Search -->
    <div class="section">

        <h2>Search Expense</h2>

        <div class="form-grid">

            <input type="date" id="searchDate">

            <select id="searchFeed">
                <option value="">All Feed Types</option>
                <option>Grass</option>
                <option>Lucerne</option>
                <option>Dana</option>
                <option>Gandum Ka Daliya</option>
                <option>Tori</option>
                <option>Chokar</option>
                <option>Khul</option>
            </select>

            <select id="searchPayment">
                <option value="">All Payments</option>
                <option>Cash</option>
                <option>Online</option>
            </select>

        </div>

    </div>


    <!-- Expense Table -->
    <div class="section">

        <h2>Expense History</h2>

        <table>

            <thead>
            <tr>
                <th>Date</th>
                <th>Feed</th>
                <th>Qty</th>
                <th>Amount</th>
                <th>Payment</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>


    <!-- Charts -->
    <div class="section">

        <h2>Analytics</h2>

        <canvas id="pieChart"></canvas>

        <br><br>

        <canvas id="barChart"></canvas>

    </div>


    <!-- Reports -->
    <div class="section">

        <h2>Reports</h2>

        <button onclick="exportPDF()">Export PDF</button>
        <button onclick="exportExcel()">Export Excel</button>
        <button onclick="clearAll()">Clear All Data</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
